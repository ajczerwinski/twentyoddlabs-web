<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twenty Odd Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 520px; }
        h1 { font-size: 2.2rem; margin-bottom: 0.75rem; }
        .tagline { font-size: 1.15rem; opacity: 0.9; margin-bottom: 1.5rem; line-height: 1.5; }
        .contact {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-top: 1rem;
        }
        .contact a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Twenty Odd Labs</h1>
        <p class="tagline">We develop mobile applications and subscription-based software products focused on simple, user-friendly digital experiences.</p>
        <p class="contact">Contact: <a href="mailto:founder@twentyoddlabs.com">founder@twentyoddlabs.com</a></p>
    </div>
</body>
</html>
